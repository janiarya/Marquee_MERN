<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;

        }
        button:hover{

            transition: 0.4s;
            cursor: pointer;
            transform: scale(1.04);

        }
        button{
            font-weight: bolder;
            font-size: 20px;
            font-family: Arial, Helvetica, sans-serif;
            font-style: italic;
            font-variant: small-caps;
            font-stretch: expanded;
            font-size-adjust: 0.5;
            font-kerning: normal;
            font-variant-ligatures: common-ligatures;
            overflow: hidden;
            align-self: start;
            height: 50px;
            

        }
        p{
            color: rgb(218, 145, 145);
            font-size: 20px;
            font-weight: bold;
            text-decoration: underline;
            text-decoration-color: rgb(218, 145, 145);
            text-decoration-thickness: 2px;
            text-decoration-style: dashed;

        }
        table{
            border: 2px solid rgb(218, 145, 145);
            border-radius: 5px;
            padding: 10px;
            text-align: center;
            border-collapse: collapse;
        }
        td{
            border: 2px solid rgb(218, 145, 145);
            padding: 10px;
        }
        td:hover{
            border: 2px solid rgb(218, 145, 145);
            transition: 0.2s;
            transform: scale(1.02);
            background-color: rgb(218, 145, 145);
            cursor: pointer;
            
            
        }
        p:hover{
            transition: 0.2s;
            transform: scale(1.02);
            color: rgb(218, 145, 145);
            cursor: pointer;
        }
        p#hover-text{
            color: rgb(129, 170, 229);
            font-size: 20px;
            font-weight: bold;
            text-decoration: underline;
            text-decoration-color: rgb(122, 210, 218);
            text-decoration-thickness: 2px;
            text-decoration-style: dashed;
        }
        p#hover-text:hover{
            transition: 0.2s;
            transform: scale(1.02);
            color: rgb(218, 145, 145);
            cursor: pointer;
            text-decoration: underline;
            text-decoration-color: rgb(218, 145, 145);
            text-decoration-thickness: 2px;
            text-decoration-style: wavy;
        }

    </style>
</head>
<body>
    <h2>Form successfully submitted</h2>
    <button style="border: none; border-radius: 5px; background-color: lightcoral; padding: 10px;" value="Submit" >Submit</button>
    <button style="border: none; border-radius: 5px; background-color: lightcoral; padding: 10px;"
        value="Submit">Submit</button>

    <p>lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>

    <table>
        <tr>
            <td>1</td>
            <td>2</td>
            <td>3</td>
        </tr>
        <tr>
            <td>arya</td>
            <td>dhairya</td>
            <td>Dharmik</td>
        </tr>
        <tr>
            <td>90</td>
            <td>99</td>
            <td>90</td>
        </tr>
    </table>
    <p id="hover-text">This table here is using hover effects try to hover around each cell</p>
</body>
</html>
