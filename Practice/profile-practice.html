<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #dbeafe, #f8fafc);
        min-height: 100vh;
      }
      .content {
        width: 350px;
        height: 500px;
        /* background-color: wheat; */
        border-radius: 38px;
        border: 3px solid white;
        overflow: hidden;
    
        box-shadow: 0 5px 20px rgb(0, 0, 0,8);
      }
      .card{
        text-align: center;
        padding: 20px;
      }
    .top-bg {
        width: 100%;
        height: 120px;
        background: rgb(44, 116, 164);
      }
      .profile{
        border-radius: 50%;
        width: 140px;
        height: 140px;
        top: 160px;
        left: 50%;
        transform: translate(-50%);
        position: fixed;
        object-fit: cover;
        border: 3px solid white;

      }
    .card {
        margin-top: 60px;
        color: rgb(55, 55, 94);
      }
    </style>
  </head>
  <body>
    <div class="content">
        <div class="top-bg"></div>
        
            <img src="https://tse1.mm.bing.net/th/id/OIP.ET9xIvuHTC9DOfWu1TD_DQHaHa?r=0&pid=Api&P=0&h=180" alt="" class="profile">
        

      <div class="card">
        <h3>Profile Picture</h3>
        <p>Hajime no ippo</p>
      </div>
    </div>
  </body>
</html>
