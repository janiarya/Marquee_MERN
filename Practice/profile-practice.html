<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #dbeafe, #f8fafc);
        min-height: 100vh;
      }
      .content {
        width: 350px;
        height: 500px;
        /* background-color: wheat; */
        border-radius: 38px;
        border: 3px solid white;
        overflow: hidden;

        box-shadow: 0 5px 20px rgb(0, 0, 0, 8);
      }
      .card {
        text-align: center;
        padding: 20px;
      }
      .top-bg {
        width: 100%;
        height: 120px;
        background: rgb(44, 116, 164);
      }
      .profile {
        border-radius: 50%;
        width: 140px;
        height: 140px;
        top: 160px;
        left: 50%;
        transform: translate(-50%);
        position: fixed;
        object-fit: cover;
        border: 3px solid white;
      }
      .card {
        margin-top: 60px;
        color: rgb(55, 55, 94);
      }
            .icons {
        display: flex;
        justify-content: center;
        gap: 18px;
        margin-bottom: 25px;
      }

      .icons i {
        font-size: 26px;
        transition: 0.8s;
        cursor: pointer;
      }

      .icons i:hover {
        transform: scale(1.3);
      }

      .fa-facebook {
        color: #1877f2;
      }

      .fa-whatsapp {
        color: #25d366;
      }

      .fa-instagram {
        color: #e4405f;
      }

      .fa-youtube {
        color: #ff0000;
      }
      

      .card h3 {
        font-size: 28px;
      }

      .card p {
        margin-top: 5px;
        margin-bottom: 20px;
      }
            button {
        background: rgb(70, 70, 172);
        color: white;
        border: none;
        border-radius: 25px;
        padding: 10px 30px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        transform: scale(1.05);
      }
    </style>
  </head>
  <body>
    <div class="content">
      <div class="top-bg"></div>

      <img
        src="https://tse1.mm.bing.net/th/id/OIP.ET9xIvuHTC9DOfWu1TD_DQHaHa?r=0&pid=Api&P=0&h=180"
        alt=""
        class="profile"
      />

      <div class="card">
        <h3>Profile Picture</h3>
        <p>Ippo makunouchi</p>
        <p>A professional boxer</p>
        <p>kamogawa Gym</p>
        <div class="icons">
          <i class="fa-brands fa-facebook"></i>
          <i class="fa-brands fa-whatsapp"></i>
          <i class="fa-brands fa-instagram"></i>
          <i class="fa-brands fa-youtube"></i>
        </div>
              <div class="button-css">
                <button>Subscribe</button>
                <button>Message</button>
              </div>
      </div>
    </div>
  </body>
</html>
