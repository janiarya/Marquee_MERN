<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Professional Profile Card</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Poppins", sans-serif;
      background: linear-gradient(135deg, #dbeafe, #f8fafc);
      padding: 20px;
    }

    .content {
      width: 350px;
      min-height: 520px;
      background: #ffffff;
      border-radius: 28px;
      overflow: hidden;
      position: relative;
      text-align: center;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
    }

    .top-bg {
      width: 100%;
      height: 130px;
      background: linear-gradient(135deg, #2563eb, #1e3a8a);
    }

    .profile {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      border: 5px solid #ffffff;
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }

    .card {
      margin-top: 90px;
      padding: 20px 25px;
      color: #334155;
    }

    .card h3 {
      font-size: 28px;
      color: #0f172a;
      margin-bottom: 8px;
    }

    .card p {
      color: #64748b;
      margin: 6px 0;
      font-size: 15px;
    }

    .icons {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin: 25px 0;
    }

    .icons i {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #ffffff;
      font-size: 20px;
      transition: 0.3s;
      cursor: pointer;
    }

    .icons i:hover {
      transform: translateY(-5px);
    }

    .fa-facebook {
      background: #1877f2;
    }

    .fa-whatsapp {
      background: #25d366;
    }

    .fa-instagram {
      background: #e4405f;
    }

    .fa-youtube {
      background: #ff0000;
    }

    .button-css {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
    }

    button {
      padding: 12px 28px;
      border: none;
      border-radius: 30px;
      background: #2563eb;
      color: #ffffff;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: translateY(-3px);
      background: #1d4ed8;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.25);
    }

    .message {
      background: #e0e7ff;
      color: #1e40af;
    }

    .message:hover {
      background: #c7d2fe;
    }
  </style>
</head>

<body>
  <div class="content">
    <div class="top-bg"></div>

    <img src="https://tse1.mm.bing.net/th/id/OIP.ET9xIvuHTC9DOfWu1TD_DQHaHa?r=0&pid=Api&P=0&h=180" alt="Profile Picture"
      class="profile" />

    <div class="card">
      <h3>Ippo Makunouchi</h3>
      <p>Professional Boxer</p>
      <p>Kamogawa Gym</p>

      <div class="icons">
        <i class="fa-brands fa-facebook"></i>
        <i class="fa-brands fa-whatsapp"></i>
        <i class="fa-brands fa-instagram"></i>
        <i class="fa-brands fa-youtube"></i>
      </div>

      <div class="button-css">
        <button>Subscribe</button>
        <button class="message">Message</button>
      </div>
    </div>
  </div>
</body>

</html>
